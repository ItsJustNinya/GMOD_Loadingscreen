<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HazeRP – Connecting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── Background ── */
  .bg {
    position: fixed;
    inset: 0;
    background: url('Images/background.png') center center / cover no-repeat;
    z-index: 0;
  }

  /* dark overlay so text is always readable regardless of resolution */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(5, 10, 30, 0.55) 0%,
      rgba(5, 10, 30, 0.75) 60%,
      rgba(5, 10, 30, 0.92) 100%
    );
  }

  /* ── Blue light flicker – top bar ── */
  .lightbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    z-index: 10;
    display: flex;
  }
  .lightbar-left {
    flex: 1;
    background: #1a6fff;
    animation: flashBlue 1.1s steps(1) infinite;
  }
  .lightbar-right {
    flex: 1;
    background: #1a6fff;
    animation: flashBlue 1.1s steps(1) 0.55s infinite;
  }
  @keyframes flashBlue {
    0%, 49%  { opacity: 1; }
    50%, 100% { opacity: 0.1; }
  }

  /* ── Battenburg strip ── */
  .battenburg {
    position: fixed;
    top: 4px; left: 0; right: 0;
    height: 28px;
    z-index: 9;
    display: flex;
    overflow: hidden;
    opacity: 0.85;
  }
  .batt-cell {
    flex: 1;
    height: 100%;
  }
  .batt-cell:nth-child(odd)  { background: #1a6fff; }
  .batt-cell:nth-child(even) { background: #ffffff; }

  /* ── Main layout ── */
  .screen {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: clamp(40px, 7vh, 80px);
  }

  /* ── Logo ── */
  .logo-wrap {
    margin-bottom: clamp(16px, 3vh, 32px);
    animation: fadeUp 0.8s ease both;
  }
  .logo-wrap img {
    width: clamp(100px, 14vw, 180px);
    height: clamp(100px, 14vw, 180px);
    object-fit: contain;
    filter: drop-shadow(0 0 18px rgba(26, 111, 255, 0.6));
  }

  /* ── Server name ── */
  .server-name {
    font-size: clamp(2.4rem, 6vw, 5rem);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow:
      0 0 30px rgba(26, 111, 255, 0.8),
      0 2px 4px rgba(0,0,0,0.6);
    animation: fadeUp 0.8s 0.15s ease both;
    line-height: 1;
  }

  /* ── Thin divider ── */
  .divider {
    width: clamp(120px, 20vw, 280px);
    height: 2px;
    margin: clamp(10px, 2vh, 18px) 0;
    background: linear-gradient(90deg, transparent, #1a6fff, #ffffff, #1a6fff, transparent);
    animation: fadeUp 0.8s 0.25s ease both;
  }

  /* ── Tagline ── */
  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.65rem, 1.4vw, 1rem);
    letter-spacing: 0.3em;
    color: rgba(200, 220, 255, 0.75);
    text-transform: uppercase;
    animation: fadeUp 0.8s 0.35s ease both;
    margin-bottom: clamp(20px, 4vh, 40px);
  }

  /* ── Status ticker ── */
  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.8s 0.5s ease both;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #1a6fff;
    box-shadow: 0 0 8px #1a6fff;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }
  .status-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.6rem, 1.1vw, 0.8rem);
    color: rgba(160, 200, 255, 0.8);
    letter-spacing: 0.2em;
  }
  .status-text span {
    color: #ffffff;
    animation: blink 2.4s steps(1) infinite;
  }
  @keyframes blink {
    0%, 79%  { opacity: 1; }
    80%, 100% { opacity: 0; }
  }

  /* ── Bottom bar – "POLICE" tape ── */
  .police-tape {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: clamp(28px, 4vh, 40px);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a6fff;
    overflow: hidden;
  }
  .tape-text {
    font-weight: 700;
    font-size: clamp(0.7rem, 1.5vw, 1rem);
    letter-spacing: 0.4em;
    color: #ffffff;
    white-space: nowrap;
    animation: scroll 18s linear infinite;
  }
  @keyframes scroll {
    from { transform: translateX(60vw); }
    to   { transform: translateX(-100%); }
  }

  /* ── Entry animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
