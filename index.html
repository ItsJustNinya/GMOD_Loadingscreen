<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HazeRP | Welcome</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            /* Ensures the background scales perfectly to any resolution */
            background: url('Images/background.png') no-repeat center center fixed;
            background-size: cover;
            
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.4); /* Subtle dark overlay for readability */
            padding: 3em;
            border-radius: 20px;
            backdrop-filter: blur(5px); /* Softens the background behind the UI */
        }

        .logo {
            width: 320px; /* Controlled size for a 1:1 image */
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.5));
        }

        h1 {
            font-size: 4em;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-bottom: 0.2em;
            text-transform: uppercase;
        }

        h2 {
            font-size: 1.5em;
            font-weight: 400;
            color: #d1d1d1;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .uk-tag {
            margin-top: 15px;
            font-size: 0.9em;
            background: #ce1126; /* Classic UK Red */
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Images/Logo.png" alt="HazeRP Logo" class="logo">
        
        <h1>HazeRP</h1>
        <h2>Haze Police RolePlay</h2>
        
        <div class="uk-tag">UNITED KINGDOM</div>
    </div> 

</body>
</html>
