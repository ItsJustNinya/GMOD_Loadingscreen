<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  h1 { font-size: 3em; letter-spacing: 0.2em; color: #fff; }
  p  { margin-top: 1em; color: #888; font-size: 1.1em; }
  .bar-wrap {
    margin-top: 2em;
    width: 300px; height: 4px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, #4af, #a4f);
    border-radius: 2px;
    animation: slide 1.6s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>
  <h1>MY SERVER</h1>
  <p>Connecting you to the game...</p>
  <div class="bar-wrap"><div class="bar"></div></div>
</body>
</html>
